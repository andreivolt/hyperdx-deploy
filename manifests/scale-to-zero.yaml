# HyperDX is parked: the whole stack is scaled to 0 replicas to drop its
# steady ClickHouse/MongoDB/OTEL floor off volt's IO-saturated single node.
# No HyperDX consumers remain (no-users demo), so the ingest + query workloads
# are pure baseline cost. The clickhouse/mongodb PVCs are deliberately KEPT
# (they're standalone chart resources, untouched by these replica patches) so
# the hot data survives and the stack can be un-parked by reverting this.
#
# hyperdx.replicas / otel.replicas are driven to 0 from values/hyperdx.yaml;
# mongodb + clickhouse have no replicas value in the chart, so they're patched
# here directly. Targeted by name in kustomization.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
spec:
  replicas: 0
