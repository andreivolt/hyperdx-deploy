apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hyperdx
  namespace: hyperdx
  annotations:
    # Wildcard *.volt.tail.avolt.net cert is minted in cert-manager and
    # mirrored into every namespace by reflector — no per-host
    # cert-manager.io annotation needed.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # tailnet-only gates the host to Tailscale IPs; hyperdx-auto-login then
    # injects andrei's session cookie so the UI opens with no login form
    # (HyperDX has no anonymous mode — see manifests/middleware-auto-login.yaml).
    # Order matters: reject non-tailnet sources before handing out a session.
    traefik.ingress.kubernetes.io/router.middlewares: hyperdx-tailnet-only@kubernetescrd,hyperdx-hyperdx-auto-login@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - hyperdx.volt.tail.avolt.net
      secretName: wildcard-tail-avolt-net-tls
  rules:
    - host: hyperdx.volt.tail.avolt.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # chart release name = `hyperdx`, fullname appends the
                # chart name -> `hyperdx-hdx-oss-v2`, and the app Service
                # gets `-app` suffixed. Frontend listens on port 3000.
                name: hyperdx-hdx-oss-v2-app
                port:
                  number: 3000
---
# Public OTLP/HTTP ingest for browser RUM (session replay, frontend traces,
# errors). The UI host above is tailnet-only (100.64/10), so a browser on the
# public internet can't post telemetry there. This exposes the collector's
# :4318 OTLP/HTTP receiver on a public host under the *.alimcompta.avolt.net
# wildcard (A 51.77.133.85), covered by the reflected wildcard-alimcompta cert.
# The collector already does CORS allowed_origins/headers '*' and bearer auth
# (the bearer token is the team ingestion API key the browser SDK sends).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hyperdx-otel
  namespace: hyperdx
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - otel.alimcompta.avolt.net
      secretName: wildcard-alimcompta-avolt-net-tls
  rules:
    - host: otel.alimcompta.avolt.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hyperdx-hdx-oss-v2-otel-collector
                port:
                  number: 4318
