# Strategic-merge patch on the chart's clickhouse Deployment.
#
# Adds three things:
#   1. envFrom: hyperdx-s3-credentials Secret — exposes
#      HYPERDX_S3_ACCESS_KEY / HYPERDX_S3_SECRET_KEY env vars that
#      storage.xml references via `<access_key_id from_env="…"/>`.
#   2. volumeMount: clickhouse-storage-config ConfigMap projected as
#      a single file at /etc/clickhouse-server/config.d/storage.xml
#      (ClickHouse auto-loads everything in config.d/).
#   3. volume: backing ConfigMap reference.
#
# kustomize merges list items by their `name` key (container, volume,
# volumeMount), so this is additive — it doesn't disturb the chart's
# existing config/users/data/logs mounts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperdx-hdx-oss-v2-clickhouse
spec:
  template:
    spec:
      containers:
        - name: clickhouse
          envFrom:
            - secretRef:
                name: hyperdx-s3-credentials
          volumeMounts:
            - name: storage-config
              mountPath: /etc/clickhouse-server/config.d/storage.xml
              subPath: storage.xml
      volumes:
        - name: storage-config
          configMap:
            name: hyperdx-clickhouse-storage-config
