apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hyperdx
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    dashboard.volt.tail.avolt.net/category: infra
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hyperdx
  # Single kustomize source: the repo root holds a kustomization.yaml
  # that (a) inflates the hdx-oss-v2 Helm chart via `helmCharts:` and
  # (b) layers the traefik Ingress + the S3-cold-tier storage config /
  # patch / sops-secret on top. Requires `kustomize.buildOptions:
  # --enable-helm` in argocd-cm (set by the bootstrap repo).
  source:
    repoURL: https://github.com/andreivolt/hyperdx-deploy
    targetRevision: main
    path: .
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /spec/storageClassName
  revisionHistoryLimit: 5
