# hyperdxio/hdx-oss-v2 chart values for volt's k3s cluster.
#
# All three storage backends (ClickHouse hot, MongoDB, OTEL collector) run
# bundled inside the chart. Ingress is disabled here and a sibling
# manifests/ingress.yaml mints the traefik route using the mirrored
# *.volt.tail.avolt.net wildcard cert (same pattern as bugsink).
#
# Cold-tier (Garage S3, `hyperdx-cold` bucket) is wired via the sibling
# kustomization.yaml at the repo root: it inflates this chart with
# helmCharts and then strategic-merge-patches the clickhouse Deployment to
# mount a `<storage_configuration>` sidecar ConfigMap + envFrom the
# `hyperdx-s3-credentials` Secret. See README "Cold-tier storage".

global:
  storageClassName: local-path

hyperdx:
  # Public-facing URL — embedded in emails, OAuth callbacks, etc.
  frontendUrl: https://hyperdx.volt.tail.avolt.net
  nodeSelector:
    environment: prod
  ingress:
    # Sibling manifests/ingress.yaml mints the traefik route.
    enabled: false
  # No auth-disable env here: HyperDX OSS v2 has no anonymous mode, and its
  # IS_LOCAL_MODE is a build-time NEXT_PUBLIC flag baked into the standard image
  # as false (a runtime IS_LOCAL_MODE_ENABLED env is inert — it was set here
  # before and never bypassed the login screen). The no-login behaviour is done
  # at the ingress instead, by injecting a valid session cookie — see
  # manifests/middleware-auto-login.yaml.

mongodb:
  enabled: true
  nodeSelector:
    environment: prod
  persistence:
    enabled: true
    dataSize: 5Gi

clickhouse:
  enabled: true
  nodeSelector:
    environment: prod
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      # Hard CPU ceiling. ClickHouse sees the host's 8 cores and otherwise
      # over-threads + self-monitors itself into a steady ~410m idle burn on
      # this IO-saturated single node (see manifests/clickhouse-perf-config.yaml
      # for the thread-pool / system-log fixes that address the cause). Actual
      # HyperDX query load here is a few tens of millicores, so 1 core is ample
      # headroom and just caps runaway background churn.
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    # 7d hot retention target — sized for alimcompta + email2pr + monolith.
    dataSize: 10Gi
    logSize: 2Gi

otel:
  enabled: true
  replicas: 1
  nodeSelector:
    environment: prod
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Kill the ClickHouse self-scrape loop. The collector's OpAMP config (pushed by
  # the app, hardcoded in opampController.ts) builds a `prometheus` receiver
  # scraping two static targets — the collector's own :8888 and
  # ${env:CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT} (ClickHouse's :9363) — then
  # re-inserts every sample back into otel_metrics_* on the same ClickHouse. That
  # ClickHouse scrape alone is ~1559 series every 30s → ~600 tiny parts/hour and
  # ~225s of MergeParts/hour on volt's fsync-bound HDD, while real apps
  # (alimcompta) send 0 telemetry. The receiver and its env target are hardcoded
  # in the app's OpAMP config and can't be removed from the chart, but this env
  # is the one knob: pointing it at the collector's own :8888 makes the second
  # target identical to the first, so the prometheus receiver deduplicates them
  # into a single harmless self-scrape and never touches ClickHouse. otlp +
  # fluentforward receivers are untouched, so alimcompta telemetry still flows.
  # (clickhouse.prometheus.enabled stays true only because the chart gates this
  # env block on it; ClickHouse's now-unscraped :9363 endpoint costs nothing.)
  clickhousePrometheusEndpoint: "0.0.0.0:8888"

# check-alerts CronJob — off while the stack is parked (nothing to alert on
# with the app/clickhouse at 0; it was spawning a job per minute otherwise).
tasks:
  enabled: false
