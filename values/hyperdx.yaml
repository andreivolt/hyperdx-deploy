# hyperdxio/hdx-oss-v2 chart values for volt's k3s cluster.
#
# All three storage backends (ClickHouse hot, MongoDB, OTEL collector) run
# bundled inside the chart. Ingress is disabled here and a sibling
# manifests/ingress.yaml mints the traefik route using the mirrored
# *.volt.tail.avolt.net wildcard cert (same pattern as bugsink).
#
# Cold-tier (Garage S3, `hyperdx-cold` bucket) is wired via the sibling
# kustomization.yaml at the repo root: it inflates this chart with
# helmCharts and then strategic-merge-patches the clickhouse Deployment to
# mount a `<storage_configuration>` sidecar ConfigMap + envFrom the
# `hyperdx-s3-credentials` Secret. See README "Cold-tier storage".

global:
  storageClassName: local-path

hyperdx:
  # Public-facing URL — embedded in emails, OAuth callbacks, etc.
  frontendUrl: https://hyperdx.volt.tail.avolt.net
  nodeSelector:
    environment: prod
  ingress:
    # Sibling manifests/ingress.yaml mints the traefik route.
    enabled: false

mongodb:
  enabled: true
  nodeSelector:
    environment: prod
  persistence:
    enabled: true
    dataSize: 5Gi

clickhouse:
  enabled: true
  nodeSelector:
    environment: prod
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  persistence:
    enabled: true
    # 7d hot retention target — sized for alimcompta + email2pr + monolith.
    dataSize: 10Gi
    logSize: 2Gi

otel:
  enabled: true
  replicas: 1
  nodeSelector:
    environment: prod
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

tasks:
  enabled: true
